<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Selection</title>
    <link rel="stylesheet" href="nui://nui-theme/web/theme.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="parallax-bg" id="parallaxBg">
        <div class="particle particle-1"></div>
        <div class="particle particle-2"></div>
        <div class="particle particle-3"></div>
        <div class="particle particle-4"></div>
        <div class="particle particle-5"></div>
    </div>

    <div id="app">
        <!-- Loading Screen -->
        <div id="loading-screen" class="screen">
            <div class="loading-container">
                <div class="loading-spinner-lg"></div>
                <div class="loading-text">Loading characters...</div>
                <div class="skeleton-group">
                    <div class="skeleton skeleton-card stagger-1"></div>
                    <div class="skeleton skeleton-card stagger-2"></div>
                    <div class="skeleton skeleton-card stagger-3"></div>
                </div>
            </div>
        </div>

        <!-- Character Selector Screen -->
        <div id="selector-screen" class="screen">
            <div class="header animate-fadeInDown">
                <div class="header-icon">👥</div>
                <h1>Select Character</h1>
                <p class="subtitle">Choose a character to enter Los Santos</p>
            </div>
            <div id="character-list" class="character-grid"></div>
            <button id="create-new-btn" class="btn btn-gold btn-lg create-btn animate-fadeInUp stagger-10">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
                Create New Character
            </button>
            <div class="footer-info animate-fadeInUp">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
                Select a character, then choose your spawn location
            </div>
        </div>

        <!-- Spawn Selector Screen -->
        <div id="spawn-screen" class="screen">
            <button id="back-to-selector" class="back-ghost">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
                Back
            </button>
            <div class="spawn-header">
                <h1>Where to spawn?</h1>
                <p id="spawn-character-name" class="subtitle">Loading...</p>
            </div>
            <div id="spawn-map-container">
                <div id="spawn-map"></div>
                <div id="spawn-overlay">
                    <button id="btn-last-location" class="btn btn-gold spawn-action-btn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
                        Last Location
                    </button>
                    <button id="btn-spawn-here" class="btn btn-primary spawn-action-btn" disabled>
                        Spawn Here
                    </button>
                    <div id="selected-location-info" class="location-info">Click on the map or a marker to choose</div>
                </div>
            </div>
        </div>

        <!-- Character Creation Screen -->
        <div id="creation-screen" class="screen">
            <div class="header">
                <button id="back-to-selector2" class="back-ghost">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
                    Back
                </button>
                <div class="header-icon">✨</div>
                <h1>New Character</h1>
                <p class="subtitle">Create your identity in Los Santos</p>
            </div>
            <form id="creation-form" class="creation-form animate-fadeInUp">
                <div class="form-row">
                    <div class="form-group">
                        <label for="firstname">First Name</label>
                        <input type="text" id="firstname" class="input" placeholder="e.g. John" maxlength="24" required>
                    </div>
                    <div class="form-group">
                        <label for="lastname">Last Name</label>
                        <input type="text" id="lastname" class="input" placeholder="e.g. Doe" maxlength="24" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="birthdate">Date of Birth</label>
                        <input type="date" id="birthdate" class="input" required>
                    </div>
                    <div class="form-group">
                        <label for="gender">Gender</label>
                        <select id="gender" class="input">
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                        </select>
                    </div>
                </div>
                <div class="form-error" id="creation-error"></div>
                <button type="submit" class="btn btn-gold btn-lg">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg>
                    Create Character
                </button>
            </form>
        </div>
    </div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
