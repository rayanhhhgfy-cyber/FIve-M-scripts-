<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Bypass</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div id="hack-container">
        <div id="hack-header">
            <i class="fas fa-shield-halved"></i> Security Terminal Bypass
        </div>
        <div id="hack-status">Watching pattern...</div>
        <div id="pattern-display"></div>
        <div id="hack-grid">
            <div class="hack-cell" data-index="0"></div>
            <div class="hack-cell" data-index="1"></div>
            <div class="hack-cell" data-index="2"></div>
            <div class="hack-cell" data-index="3"></div>
        </div>
        <div id="hack-progress">
            <div id="progress-fill"></div>
        </div>
        <div id="hack-footer">Press ESC to abort</div>
    </div>
    <script src="script.js"></script>
</body>
</html>
