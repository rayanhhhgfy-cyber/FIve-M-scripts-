<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>iPhone</title>
    <link rel="stylesheet" href="nui://nui-theme/web/theme.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="boot-screen" id="bootScreen">
        <div class="boot-logo">
            <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="0.5"><path d="M17.694 9.14c-.058.047-1.444.832-1.444 2.552 0 1.484 1.3 2.418 1.34 2.45-.007.01-.21.718-.688 1.418-.42.614-.856 1.225-1.544 1.238-.675.013-.863-.438-1.645-.438-.795 0-1.061.424-1.71.45-.635.025-1.137-.67-1.563-1.281-.85-1.238-1.5-3.5-.64-5.025.426-.757 1.187-1.237 2.013-1.25.63-.012 1.225.455 1.61.455.386 0 1.11-.563 1.872-.48.318.014 1.213.128 1.788.967-.046.031-1.067.627-1.05 1.882zM14.94 5.597c.283-.344.53-.822.53-1.3 0-.066-.006-.133-.019-.197-.19.007-.513.13-.7.252-.255.166-.57.495-.57.993 0 .078.012.156.02.182.012.012.032.026.054.026.216 0 .544-.332.685-.556z"/></svg>
        </div>
        <div class="loading-spinner-lg boot-spinner"></div>
    </div>

    <div class="voice-overlay" id="voiceOverlay" style="display:none">
        <div class="voice-indicator" id="voiceIndicator">
            <div class="voice-mic" id="voiceMic">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#27c93f" stroke-width="2.5"><rect x="9" y="2" width="6" height="11" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="19" x2="12" y2="22"/></svg>
            </div>
            <div class="voice-mode" id="voiceMode">Normal</div>
            <div class="voice-targets" id="voiceTargets"></div>
        </div>
        <div class="voice-radio" id="voiceRadio" style="display:none">
            <span class="radio-icon">📡</span>
            <span class="radio-freq" id="radioFreq">--.-</span>
        </div>
        <div class="voice-call" id="voiceCallBadge" style="display:none">
            <span class="call-icon">📞</span>
            <span class="call-peer-name" id="callPeerName">Calling...</span>
            <span class="call-duration" id="callDuration">00:00</span>
        </div>
    </div>

    <div class="phone" id="phone">
        <div class="phone-frame-glow"></div>
        <div class="dynamic-island" id="dynamicIsland">
            <span class="time" id="timeDisplay">00:00</span>
            <span class="battery" id="batteryDisplay">
                <svg width="22" height="11" viewBox="0 0 24 12" fill="none">
                    <rect x="1" y="1" width="18" height="10" rx="2" stroke="currentColor" stroke-width="1.5" fill="none"/>
                    <rect x="20" y="4" width="2" height="4" rx="1" fill="currentColor"/>
                    <rect id="batteryFill" x="3" y="3" width="14" height="6" rx="1" fill="#27c93f"/>
                </svg>
            </span>
        </div>

        <div class="screen" id="screen">
            <!-- Home Screen Wallpaper (CSS gradient layer) -->
            <div class="wallpaper" id="wallpaper"></div>

            <div class="notifications-shade" id="notifShade">
                <div class="notif-header">
                    <span class="notif-title">Notifications</span>
                    <button class="notif-dismiss" onclick="closeNotifShade()">✕</button>
                </div>
                <div class="notif-list" id="notifList">
                    <div class="notif-empty">No new notifications</div>
                </div>
            </div>

            <div class="app-home" id="appHome">
                <div class="app-grid" id="appGrid"></div>
                <div class="dock" id="dock"></div>
            </div>

            <div class="app-view hidden" id="appView">
                <div class="app-header">
                    <button class="back-btn" id="backBtn">
                        <svg width="12" height="20" viewBox="0 0 12 20"><path d="M10 2L2 10l8 8" stroke="currentColor" stroke-width="2.5" fill="none"/></svg>
                    </button>
                    <span class="app-title" id="appTitle">App</span>
                </div>
                <div class="app-content" id="appContent"></div>
            </div>

            <!-- Incoming Call Overlay -->
            <div class="incoming-call hidden" id="incomingCall">
                <div class="incall-backdrop"></div>
                <div class="incall-content glass-card animate-scaleIn">
                    <div class="incall-avatar" id="incallAvatar">?</div>
                    <div class="incall-name" id="incallName">Unknown</div>
                    <div class="incall-status">Incoming Call</div>
                    <div class="incall-actions">
                        <button class="incall-btn decline" id="declineBtn">
                            <span class="incall-btn-circle decline-circle">
                                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                            </span>
                            <span>Decline</span>
                        </button>
                        <button class="incall-btn accept" id="acceptBtn">
                            <span class="incall-btn-circle accept-circle">
                                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                            </span>
                            <span>Accept</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Active Call Overlay -->
            <div class="active-call hidden" id="activeCall">
                <div class="actcall-backdrop"></div>
                <div class="actcall-content glass-card animate-scaleIn">
                    <div class="actcall-avatar" id="actcallAvatar">?</div>
                    <div class="actcall-name" id="actcallName">Unknown</div>
                    <div class="actcall-duration" id="actcallDuration">00:00</div>
                    <div class="actcall-actions">
                        <button class="actcall-btn" id="callMuteBtn">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
                            <span>Mute</span>
                        </button>
                        <button class="actcall-btn" id="callSpeakerBtn">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
                            <span>Speaker</span>
                        </button>
                        <button class="actcall-btn end-call" id="endCallBtn">
                            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                            <span>End</span>
                        </button>
                        <button class="actcall-btn" id="callKeypadBtn">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><rect x="2" y="2" width="4" height="4"/><rect x="10" y="2" width="4" height="4"/><rect x="18" y="2" width="4" height="4"/><rect x="2" y="10" width="4" height="4"/><rect x="10" y="10" width="4" height="4"/><rect x="18" y="10" width="4" height="4"/><rect x="10" y="18" width="4" height="4"/></svg>
                            <span>Keypad</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="home-indicator"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
