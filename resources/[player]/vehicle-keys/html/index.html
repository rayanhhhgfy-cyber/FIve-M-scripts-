<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lockpick</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="lockpick-container">
        <div id="lockpick-header">
            <i class="fas fa-lock"></i> Lockpick Vehicle
        </div>
        <div id="lockpick-info">
            <span id="round-display">Round 1 / 4</span>
            <span id="fail-display">Fails: 0 / 3</span>
        </div>
        <canvas id="lockpick-canvas" width="280" height="280"></canvas>
        <div id="lockpick-instructions">
            Click when the needle is inside the <span class="gold">golden zone</span>
        </div>
        <div id="lockpick-status"></div>
    </div>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="script.js"></script>
</body>
</html>
