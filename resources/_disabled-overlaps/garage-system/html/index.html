<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garage</title>
    <link rel="stylesheet" href="nui://nui-theme/web/theme.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="garage-ui" class="glass-panel">
        <div id="garage-header">
            <span id="garage-title">Garage</span>
            <span id="garage-type-badge" class="badge"></span>
            <button id="garage-close" class="btn btn-ghost">&times;</button>
        </div>
        <div id="garage-body">
            <div id="garage-actions">
                <button id="garage-store-btn" class="btn btn-primary full">
                    &#8595; Store Current Vehicle
                </button>
            </div>
            <div id="garage-stats">
                <span id="garage-slot-info">Vehicles: 0 / 0</span>
            </div>
            <div id="vehicle-list"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
