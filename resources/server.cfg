# NOTE: explicit ensures below are redundant with `ensure [player]` above but kept
# for documentation. Winners of the overlap audit:
ensure [player]/hud              # HUD winner (cdn-hud disabled)
ensure [player]/radio            # Radio winner (radio-system disabled)
ensure [player]/outfit-manager   # Outfit winner (linden-outfits/-outfitbag disabled)
ensure [player]/Renewed-Garages  # Garage winner (garage-system disabled; tuning-garage kept for mods)
ensure [player]/radialmenu        # New radial menu
ensure [player]/vehicle-keys      # Vehicle key system + lockpick mini-game
