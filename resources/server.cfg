ensure [player]/item-actions        # Handcuffs, bodycam, police_ram, binoculars use handlers
ensure [player]/notepad              # In-game notepad for detective RP

# Server Settings
sv_maxclients 64
sv_hostname "QBox Framework Server"
sv_master1 ""
set tags "qbox, fivem, rp"
sets locale "en-US"
load_server_icon logo.png
set steam_webApiKey ""

# ────────────────────────────────────────────────
# 🚀 REQUIRED FOR LAUNCH — fill these in before going live
# ────────────────────────────────────────────────
# Steam Web API key (player identity validation). Get one at:
#   https://steamcommunity.com/dev/apikey
# set steam_webApiKey "YOUR_STEAM_WEB_API_KEY"

# Cfx.re server license key (REQUIRED or the server will not list/join).
# Generate one at:  https://keymaster.fivem.net/
# set sv_licenseKey "YOUR_CFX_SERVER_LICENSE_KEY"

# (Optional) a memorable server listing URL.
# sets sv_projectName "Your Project Name"
# sets sv_projectDesc "Your server description"
sv_scriptHookAllowed 0
sv_endpoint_ping true
sv_enhancedHostSupport 1
sv_authMaxVariance 1
sv_authMinTrust 0
sv_enforceGameBuild 2802
